    <!-- Structured data: FAQ (kept in sync with the on-page FAQ) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Où se trouve le Garage Auto Alliance et comment le contacter ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Le Garage Auto Alliance est situé au 106 rue André Bollier, dans le 7e arrondissement de Lyon (69007), près de la Guillotière. Vous pouvez nous joindre au 04 72 71 86 31 ou prendre rendez-vous via le formulaire en ligne."
            }
          },
          {
            "@type": "Question",
            "name": "Quels services proposez-vous à Lyon 7e ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Nous assurons l'entretien et la réparation toutes marques : révision, vidange, freinage, distribution, climatisation, pneumatiques et diagnostic électronique, ainsi que la carrosserie (débosselage, peinture au teintier, châssis, pare-brise). Un véhicule de prêt est disponible sur demande."
            }
          },
          {
            "@type": "Question",
            "name": "Travaillez-vous toutes les marques de véhicules ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Oui. En tant qu'atelier du réseau Eurorepar, nous entretenons et réparons tous les véhicules, toutes marques, qu'ils soient essence, diesel ou hybrides. L'entretien préserve la garantie constructeur."
            }
          },
          {
            "@type": "Question",
            "name": "Combien coûte une vidange ou une révision ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "À titre indicatif, une vidange avec filtre démarre à 79 € et une révision complète à 149 € (pièces et main-d'œuvre incluses). Chaque intervention fait l'objet d'un devis gratuit et personnalisé selon votre véhicule."
            }
          },
          {
            "@type": "Question",
            "name": "Le devis est-il gratuit ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Oui, le devis est gratuit et sans engagement. Le coût d'un diagnostic électronique est déduit de la facture si vous nous confiez la réparation."
            }
          },
          {
            "@type": "Question",
            "name": "Faites-vous la carrosserie après un accident ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Oui. Notre atelier carrosserie réalise le débosselage, le redressage de châssis, le remplacement de pare-brise et la peinture au teintier pour une finition d'origine, toutes marques."
            }
          },
          {
            "@type": "Question",
            "name": "Quels sont vos horaires et comment prendre rendez-vous ?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Le garage est ouvert du lundi au jeudi de 7h30 à 18h30 et le vendredi de 9h00 à 12h00 (fermé le week-end). Pour un rendez-vous, appelez le 04 72 71 86 31 ou utilisez le formulaire de prise de rendez-vous du site."
            }
          }
        ]
